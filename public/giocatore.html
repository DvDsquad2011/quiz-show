<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pulsante Giocatore</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body {
            background-color: #020617;
            min-height: 92vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 24px;
            color: #f8fafc;
            transition: background 0.5s;
        }
        .bg-blu { background: linear-gradient(to bottom, #0f172a, #0f1d3a); }
        .bg-rossa { background: linear-gradient(to bottom, #0f172a, #2a1212); }
        
        .profilo-card {
            width: 100%;
            max-width: 340px;
            background-color: rgba(0, 0, 0, 0.4);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            box-sizing: border-box;
        }
        .prof-titolo { font-size: 10px; font-weight: 900; text-transform: uppercase; tracking-widest: 2px; color: #94a3b8; margin: 0; letter-spacing: 1px;}
        #info-nome { font-size: 20px; font-weight: 900; margin: 4px 0 0 0; color: white; text-transform: uppercase;}
        .badge { px-padding: 6px 16px; padding: 6px 16px; border-radius: 9999px; font-size: 12px; font-weight: 900; border: 1px solid rgba(255, 255, 255, 0.1); }
        .b-blu { background-color: rgba(59, 130, 246, 0.2); color: #60a5fa; border-color: rgba(59, 130, 246, 0.3); box-shadow: 0 0 15px rgba(59, 130, 246, 0.15); }
        .b-rossa { background-color: rgba(239, 68, 68, 0.2); color: #f87171; border-color: rgba(239, 68, 68, 0.3); box-shadow: 0 0 15px rgba(239, 68, 68, 0.15); }
        
        .area-pulsante { display: flex; flex-direction: column; align-items: center; justify-content: center; margin: auto 0; }
        
        #pulsante {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            border: 4px solid #34d399;
            background: linear-gradient(to bottom, #34d399, #059669);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            outline: none;
            user-select: none;
            -webkit-user-select: none;
            transition: all 0.1s;
            transform: translateY(-6px);
            box-shadow: 0 15px 30px rgba(52, 211, 153, 0.4), inset 0 -8px 0 rgba(0,0,0,0.3), inset 0 8px 0 rgba(255,255,255,0.3);
        }
        #pulsante:active {
            transform: translateY(2px);
            box-shadow: 0 4px 10px rgba(52, 211, 153, 0.2), inset 0 -2px 0 rgba(0,0,0,0.3);
        }
        .btn-testo-p { font-size: 28px; font-weight: 900; letter-spacing: 2px; text-shadow: 0 2px 4px rgba(0,0,0,0.4); }
        #sub-testo { font-size: 11px; font-weight: bold; text-transform: uppercase; opacity: 0.8; margin-top: 4px; letter-spacing: 1px;}
        
        .buzzer-bloccato {
            transform: translateY(0) !important;
            box-shadow: inset 0 6px 12px rgba(0,0,0,0.8) !important;
            background: linear-gradient(to bottom, #1e293b, #0f172a) !important;
            border-color: #334155 !important;
            color: #475569 !important;
            cursor: not-allowed !important;
        }
        
        .barra-stato { width: 100%; max-width: 340px; text-align: center; background-color: rgba(0, 0, 0, 0.3); border-radius: 12px; py-padding: 12px; padding: 12px; border: 1px solid rgba(255, 255, 255, 0.05); box-sizing: border-box;}
        #stato-sistema { font-size: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; color: #34d399; display: flex; align-items: center; justify-content: center; gap: 8px; margin: 0; }
        .punti-luce { width: 8px; height: 8px; border-radius: 50%; display: inline-block; background-color: #34d399; }
        .lampeggia { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .txt-errore { color: #f87171 !important; }
        .punti-errore { background-color: #ef4444 !important; }
        .txt-vittoria { color: #fbbf24 !important; }
        .punti-vittoria { background-color: #fbbf24 !important; }
    </style>
</head>
<body id="sfondo">
    
    <div class="profilo-card">
        <div>
            <p class="prof-titolo">Concorrente</p>
            <h2 id="info-nome">-</h2>
        </div>
        <span id="badge-squadra" class="badge"></span>
    </div>

    <div class="area-pulsante">
        <button id="pulsante" onclick="prenota()">
            <span class="btn-testo-p">PRENOTA</span>
            <span id="sub-testo">Tocca Qui!</span>
        </button>
    </div>

    <div class="barra-stato">
        <p id="stato-sistema">
            <span id="luce" class="punti-luce lampeggia"></span> Sistema Pronto
        </p>
    </div>

    <script>
const socket = io();
        
        // Recupera nome, squadra e codice stanza salvati dal login
        const nome = localStorage.getItem('nomeQuiz') || "Giocatore";
        const squadra = localStorage.getItem('squadraQuiz') || "blu";
        const codiceStanza = localStorage.getItem('codiceStanzaQuiz') || ""; 
        
        // COMUNICAZIONE INIZIALE: Entra nella stanza specifica appena carica la pagina
        socket.emit('joinRoom', { password: codiceStanza, nome: nome, team: squadra });

        document.getElementById('info-nome').innerText = nome;
        const sfondo = document.getElementById('sfondo');
        const badge = document.getElementById('badge-squadra');

        if(squadra === 'blu') {
            sfondo.className = "bg-blu";
            badge.innerText = "TEAM BLU";
            badge.className = "badge b-blu";
        } else {
            sfondo.className = "bg-rossa";
            badge.innerText = "TEAM ROSSO";
            badge.className = "badge b-rossa";
        }

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playBuzzerSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(120, audioCtx.currentTime);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.2);
        }

        let puoPremere = true;
        const btn = document.getElementById('pulsante');
        const subTesto = document.getElementById('sub-testo');
        const statoTesto = document.getElementById('stato-sistema');
        const luce = document.getElementById('luce');

        // FUNZIONE MODIFICATA: Invia la pressione includendo la stanza corrente
        function prenota() {
            if (!puoPremere) return;
            socket.emit('pressione_pulsante', { password: codiceStanza, nome: nome, squadra: squadra });
        }

        // RICEZIONE PRENOTAZIONE (Solo da utenti della tua stanza)
        socket.on('risultato_buzzer', (data) => {
            puoPremere = false;
            btn.className = "buzzer-bloccato";
            playBuzzerSound();
            
            if (data.vincitore.nome === nome) {
                subTesto.innerText = "PRESO!";
                statoTesto.className = "txt-vittoria";
                luce.className = "punti-luce punti-vittoria";
                statoTesto.innerHTML = `<span class="punti-luce punti-vittoria"></span> TOCCA A TE RISPONDERE`;
            } else {
                subTesto.innerText = "BLOCCATO";
                statoTesto.className = "txt-errore";
                luce.className = "punti-luce punti-errore";
                statoTesto.innerHTML = `<span class="punti-luce punti-errore"></span> PRIMO: ${data.vincitore.nome.toUpperCase()}`;
            }
        });

        // RICEZIONE RESET (Attivato dal tuo conduttore)
        socket.on('sistema_resettato', () => {
            puoPremere = true;
            btn.className = "";
            subTesto.innerText = "Tocca Qui!";
            statoTesto.className = "";
            statoTesto.innerHTML = `<span class="punti-luce punti-luce lampeggia"></span> Sistema Pronto`;
        });

        // NOTIFICA ERRORE (Se la stanza chiude o ci sono problemi)
        socket.on('erroreStanza', (messaggio) => {
            alert(messaggio);
            window.location.href = "/"; // Rimanda alla pagina di login
        });
    </script>
</body>
</html>
